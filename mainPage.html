<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>어보브반도체(주) - 리뉴얼 레이아웃 최종안</title>
    <link rel="stylesheet" href="mainPage.css">
</head>
<body>

    <header id="site-header"></header>

    <section class="hero">
        <div class="container hero-container">
            <div class="hero-text">
                <h1>더 안전한 연결, 더 지능적인 제어</h1>
                <p class="sub">ABOV MCU/Connectivity로 완성되는 스마트한 미래</p>
                <p class="desc">고성능 · 초저전력 · 강력한 보안 기술력을 바탕으로 시장을 선도합니다.</p>
                <a href="#" class="hero-btn">자세히 보기 &gt;</a>
            </div>
            <div class="hero-graphic">
                <img src="image/banner_main_header.png" alt="ABOV Chip">
            </div>
        </div>
    </section>

    <footer id="site-footer"></footer>

    <script>
        // 헤더 파일 로드
        fetch('header.html')
        .then(response => response.text())
        .then(data => {
        document.getElementById('site-header').innerHTML = data;
        });

        // 푸터 파일 로드
        fetch('footer.html')
        .then(response => response.text())
        .then(data => {
        document.getElementById('site-footer').innerHTML = data;
        });
    </script>
</body>
</html>
